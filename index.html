<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed & Eman Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  text-align: center;
  background: #fdf6f9;
  color: #333;
}

/* Hero */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1529636798458-92182e662485') center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  color: white;
  background-blend-mode: darken;
  background-color: rgba(0,0,0,0.4);
}

h1 {
  font-size: 48px;
  margin: 0;
}

h2 {
  font-weight: 300;
}

.countdown {
  direction: rtl;
  text-align: center;
  font-size: 26px;
  margin-top: 20px;
}

/* Sections */
.section {
  padding: 50px 20px;
}

/* Gallery */
.gallery img {
  width: 90%;
  max-width: 300px;
  margin: 10px;
  border-radius: 15px;
}

/* Form */
input, textarea {
  width: 80%;
  padding: 12px;
  margin: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-family: inherit;
}

button {
  padding: 12px 25px;
  border: none;
  background: #ff6b81;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}

a {
  color: #ff6b81;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- Hero -->
<div class="hero">
  <h1>Ahmed & Eman</h1>
  <h1>Wedding Day</h1>
  <h2>هنحتفل سوا قريب ❤️</h2>
  <div class="countdown" id="countdown"></div>
</div>

<!-- Story -->
<div class="section">
  <h2>قصتنا</h2>
  <p>بداية حكايتنا كانت صدفة... وكملت بحب ❤️</p>
</div>

<!-- Location -->
<div class="section">
  <h2>مكان الزفاف 📍</h2>
  <p>تعالى نحتفل معانا هنا:</p>
  <a href="https://maps.app.goo.gl/8PTfoeUSQN3s98Dx5" target="_blank">
    اضغط هنا لمشاهدة الخريطة
  </a>
</div>

<!-- Gallery -->
<div class="section gallery">
  <h2>صورنا</h2>
  <img src="1.jpg">
  <img src="2.jpg">
  <img src="3.jpg">
  <img src="4.jpg">
  <img src="5.jpg">


<!-- Wishes -->
<div class="section">
  <h2>سيب رسالة لينا 💌</h2>

  <input type="text" id="name" placeholder="اسمك">
  <textarea id="message" placeholder="رسالتك"></textarea>
  <br>
  <button onclick="sendWish()">إرسال</button>

  <p id="status"></p>
</div>

<script>
// ⏳ التاريخ (28 أبريل 2026 - 4 العصر)
const weddingDate = new Date("2026-04-28T16:00:00+02:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  let diff = weddingDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML = "تم الزفاف ❤️";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  diff %= (1000 * 60 * 60 * 24);

  const hours = Math.floor(diff / (1000 * 60 * 60));
  diff %= (1000 * 60 * 60);

  const minutes = Math.floor(diff / (1000 * 60));
  diff %= (1000 * 60);

  const seconds = Math.floor(diff / 1000);

  document.getElementById("countdown").innerHTML =
  `${days} يوم - ${hours} ساعة - ${minutes} دقيقة - ${seconds} ثانية`;
}

setInterval(updateCountdown, 1000);
updateCountdown();


// 🔗 Google Script
const scriptURL = "https://script.google.com/macros/s/AKfycbze9IuVV1_aq_c0AJE3l-j0XfNQuwcuI9Ud1LsY41djac9QmUTQl8-1b6Kg_stWF1n6/exec";

function sendWish() {
  let name = document.getElementById("name").value;
  let message = document.getElementById("message").value;

  if (!name || !message) {
    document.getElementById("status").innerText = "اكتب الاسم والرسالة 🙏";
    return;
  }

  fetch(scriptURL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: name,
      message: message
    })
  });

  document.getElementById("status").innerText = "تم الإرسال ❤️";

  document.getElementById("name").value = "";
  document.getElementById("message").value = "";
}
</script>

</body>
</html>
